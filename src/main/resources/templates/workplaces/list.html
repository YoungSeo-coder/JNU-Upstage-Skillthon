<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사업장 목록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="page">
    <section class="section-head">
        <h1>사업장 목록</h1>
        <p>승인된 후기만 클린 지수에 반영됩니다. 후기 수가 적은 사업장은 참고 지표로만 봐 주세요.</p>
    </section>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>사업장</th>
                <th>위치</th>
                <th>카테고리</th>
                <th>클린 지수</th>
                <th>후기 수</th>
                <th>최근 공고 빈도</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="workplace : ${workplaces}">
                <td><a th:href="@{/workplaces/{id}(id=${workplace.id})}" th:text="${workplace.name}">사업장명</a></td>
                <td th:text="${workplace.address}">주소</td>
                <td th:text="${workplace.category}">카테고리</td>
                <td><span class="badge" th:classappend="${workplace.markerColor}" th:text="${workplace.scoreLabel()}">80점</span></td>
                <td th:text="${workplace.reviewCount}">0</td>
                <td>
                    <span th:if="${workplace.frequentJobPosting}">공고가 자주 올라오는 편입니다</span>
                    <span th:unless="${workplace.frequentJobPosting}" th:text="${workplace.recentJobPostingCount + '건'}">0건</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
